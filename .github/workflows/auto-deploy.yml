name: Auto-deploy to main

on:
  push:
    branches: ['claude/derdiedad-fr5iz1']

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge dev branch into main
        run: |
          git checkout main
          git merge origin/claude/derdiedad-fr5iz1 --no-ff -m "Auto-deploy: sync dev changes to main"
          git push origin main
